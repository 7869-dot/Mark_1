services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: persona
      POSTGRES_PASSWORD: persona
      POSTGRES_DB: persona
    ports:
      - "5432:5432"
    volumes:
      - persona_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U persona -d persona"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://persona:persona@db:5432/persona
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-production-min-32-chars!!}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_FAKE: ${EMBEDDING_FAKE:-true}
    depends_on:
      db:
        condition: service_healthy

volumes:
  persona_pgdata:
