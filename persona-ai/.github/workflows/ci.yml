name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: persona-ai
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: persona-ai/pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check app tests scripts

      - name: Pytest
        env:
          DATABASE_URL: postgresql+asyncpg://x:x@localhost:5432/x
          SECRET_KEY: ci-secret-key-must-be-at-least-32-chars
          EMBEDDING_FAKE: "true"
        run: pytest -q
